<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 01</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- JS -->
    <script src="js/app.js" defer></script>
</head>
<body>

    <h1>Práctica 01 - Sintaxis </h1>

    <section id="info">
        <div class="card">
            <h3>Estudiante</h3>
            <p id="nombre"></p>
            <p id="apellido"></p>
            <p id="edad"></p>
            <p id="carrera"></p>
            <p id="semestre"></p>
            <p id="activo"></p>
            <p id="direccion"></p>
        </div>
    </section>

    <section id="resultados">
        <div class="card">
            <h3>Resultados</h3>
            <p id="promedio"></p>
            <p id="saludo"></p>
            <p id="aprobados"></p>
            <p id="nombres"></p>
            <p id="mejor"></p>
        </div>
    </section>
